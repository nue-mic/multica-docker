# Multica 一键启动编排（使用预构建镜像，无需本地编译）
#
# 架构：control plane / data plane 分离
#   ┌─ server   (control plane · Go 后端 · 不含 CLI)
#   ├─ web      (Next.js 前端)
#   └─ runtime  (data plane · 跑 multica daemon + claude/codex/gemini CLI)
#
# 使用步骤：
#   1. cp .env.example.full .env         # 首选完整模板（含 runtime 凭据占位）
#      或 cp .env.example .env           # 最小模板
#   2. 编辑 .env：
#      · 必填 JWT_SECRET
#      · runtime 要接入 server：填 MULTICA_TOKEN（Web UI 里生成 PAT）
#      · 按需填 ANTHROPIC_* / OPENAI_* / GEMINI_* 走官方或第三方反代
#   3. docker compose up -d
#
# 访问：
#   前端  → http://localhost:3000
#   后端  → http://localhost:8080
#
# 横向扩 runtime（多 worker 并发跑任务）：
#   docker compose up -d --scale runtime=3

services:
  postgres:
    image: pgvector/pgvector:pg17
    container_name: multica-postgres
    restart: always
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-multica}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-multica}
      POSTGRES_DB: ${POSTGRES_DB:-multica}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U ${POSTGRES_USER:-multica} -d ${POSTGRES_DB:-multica}"]
      interval: 10s
      timeout: 5s
      retries: 10
    networks:
      - multica

  # ------------------------------------------------------------
  # Control plane：Go 后端 + Postgres + 对 web/runtime 提供 HTTP/WS 接口
  # 本服务不含 agent CLI，保持最小镜像 / 最小攻击面
  # ------------------------------------------------------------
  server:
    image: ${SERVER_IMAGE:-ghcr.io/nue-mic/multica-server}:${MULTICA_TAG:-latest}
    container_name: multica-server
    restart: always
    depends_on:
      postgres:
        condition: service_healthy
    environment:
      DATABASE_URL: postgres://${POSTGRES_USER:-multica}:${POSTGRES_PASSWORD:-multica}@postgres:5432/${POSTGRES_DB:-multica}?sslmode=disable
      JWT_SECRET: ${JWT_SECRET:?JWT_SECRET 必须在 .env 中设置}
      PORT: "8080"
      CORS_ORIGINS: ${CORS_ORIGINS:-http://localhost:3000}
      # APP_ENV=development 会启用验证码主码 888888（仅用于 bootstrap 免 Web UI 签 PAT，
      # bootstrap 完成后应改回 production 或删掉，避免公网上谁都能登）。
      APP_ENV: ${APP_ENV:-production}
      # Google OAuth（可选）
      GOOGLE_CLIENT_ID: ${GOOGLE_CLIENT_ID:-}
      GOOGLE_CLIENT_SECRET: ${GOOGLE_CLIENT_SECRET:-}
      # Resend 邮件（可选）
      RESEND_API_KEY: ${RESEND_API_KEY:-}
      # S3 / CloudFront 对象存储（可选）
      AWS_ACCESS_KEY_ID: ${AWS_ACCESS_KEY_ID:-}
      AWS_SECRET_ACCESS_KEY: ${AWS_SECRET_ACCESS_KEY:-}
      S3_BUCKET: ${S3_BUCKET:-}
      S3_REGION: ${S3_REGION:-}
      CLOUDFRONT_URL: ${CLOUDFRONT_URL:-}
    ports:
      - "${BACKEND_PORT:-8080}:8080"
    volumes:
      - uploads:/app/uploads
    networks:
      multica:
        # 历史别名：web 镜像内部 Next.js 代理目标仍硬编码为 http://backend:8080。
        # 待上游 multica-web 改用环境变量（如 BACKEND_URL）后可移除。
        aliases:
          - backend

  # ------------------------------------------------------------
  # Data plane：multica daemon + 三大 agent CLI
  # 启动即 self-host 连接 server + login + foreground daemon
  # 想扩容：docker compose up -d --scale runtime=3
  # ------------------------------------------------------------
  runtime:
    image: ${RUNTIME_IMAGE:-ghcr.io/nue-mic/multica-runtime}:${MULTICA_TAG:-latest}
    restart: always
    depends_on:
      server:
        condition: service_started
    environment:
      # --- Multica daemon 接入 server ---
      MULTICA_SERVER_URL: ${MULTICA_SERVER_URL:-http://server:8080}
      MULTICA_APP_URL: ${MULTICA_APP_URL:-http://web:3000}
      # Personal Access Token（Web UI 生成）；首次启动凭此免交互登录。
      # 留空则 daemon 起来后等你 `docker compose exec runtime multica login`。
      MULTICA_TOKEN: ${MULTICA_TOKEN:-}
      # 可选：daemon 显示名 / 并发 / 超时
      MULTICA_DAEMON_DEVICE_NAME: ${MULTICA_DAEMON_DEVICE_NAME:-}
      MULTICA_AGENT_RUNTIME_NAME: ${MULTICA_AGENT_RUNTIME_NAME:-}
      MULTICA_DAEMON_MAX_CONCURRENT_TASKS: ${MULTICA_DAEMON_MAX_CONCURRENT_TASKS:-}
      # ============================================================
      # Agent CLI 三方凭据（runtime 专属；server 不需要这些）
      # ============================================================
      # --- Claude Code (Anthropic) ---
      ANTHROPIC_API_KEY: ${ANTHROPIC_API_KEY:-}
      ANTHROPIC_AUTH_TOKEN: ${ANTHROPIC_AUTH_TOKEN:-}
      ANTHROPIC_BASE_URL: ${ANTHROPIC_BASE_URL:-}
      ANTHROPIC_MODEL: ${ANTHROPIC_MODEL:-}
      # --- Codex (OpenAI) ---
      # OPENAI_BASE_URL 非空时 entrypoint 会自动生成 ~/.codex/config.toml
      OPENAI_API_KEY: ${OPENAI_API_KEY:-}
      OPENAI_BASE_URL: ${OPENAI_BASE_URL:-}
      OPENAI_MODEL: ${OPENAI_MODEL:-}
      CODEX_WIRE_API: ${CODEX_WIRE_API:-}
      CODEX_PROVIDER_NAME: ${CODEX_PROVIDER_NAME:-}
      # --- Gemini (Google) ---
      GEMINI_API_KEY: ${GEMINI_API_KEY:-}
      GOOGLE_API_KEY: ${GOOGLE_API_KEY:-}
      GOOGLE_GENAI_USE_VERTEXAI: ${GOOGLE_GENAI_USE_VERTEXAI:-}
      GOOGLE_CLOUD_PROJECT: ${GOOGLE_CLOUD_PROJECT:-}
      GOOGLE_CLOUD_LOCATION: ${GOOGLE_CLOUD_LOCATION:-}
    volumes:
      # 登录凭据与三家 CLI 配置持久化（重启/升级不丢）
      - multica_config:/root/.multica
      - claude_config:/root/.claude
      - codex_config:/root/.codex
      - gemini_config:/root/.gemini
    networks:
      - multica

  web:
    image: ghcr.io/nue-mic/multica-web:${MULTICA_TAG:-latest}
    container_name: multica-web
    restart: always
    depends_on:
      - server
    environment:
      NEXT_PUBLIC_GOOGLE_CLIENT_ID: ${NEXT_PUBLIC_GOOGLE_CLIENT_ID:-}
      NEXT_PUBLIC_WS_URL: ${NEXT_PUBLIC_WS_URL:-ws://localhost:8080}
    ports:
      - "${WEB_PORT:-3000}:3000"
    networks:
      - multica

volumes:
  postgres_data:
  uploads:
  multica_config:
  claude_config:
  codex_config:
  gemini_config:

networks:
  multica:
    driver: bridge
